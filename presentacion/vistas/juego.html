<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de la ciudad</title>
    <link rel="stylesheet" href="../estilos/juego.css">
    <link rel="stylesheet" href="../estilos/mapa.css">
</head>
<body>
    <div class="layout-juego">
        <aside class="sidebar-izquierda">
            <h1 id="nombre-ciudad">Ciudad</h1>
            <div id="datos-ciudad" class="datos-ciudad"></div>

            <section>
                <h2>Panel de recursos</h2>
                <div id="panel-recursos"></div>
            </section>

            <section class="panel-construccion">
                <h2>Construcción</h2>

                <div class="grupo-construccion">
                    <h3>Vías</h3>
                    <button id="btn-via" class="boton-construccion">Construir vía</button>
                </div>

                <div class="grupo-construccion">
                    <h3>Residenciales</h3>
                    <button id="btn-casa" class="boton-construccion">Casa</button>
                    <button id="btn-apartamento" class="boton-construccion">Apartamento</button>
                </div>

                <div class="grupo-construccion">
                    <h3>Comerciales</h3>
                    <button id="btn-tienda" class="boton-construccion">Tienda</button>
                    <button id="btn-centro-comercial" class="boton-construccion">Centro comercial</button>
                </div>

                <div class="grupo-construccion">
                    <h3>Industriales</h3>
                    <button id="btn-fabrica" class="boton-construccion">Fábrica</button>
                    <button id="btn-granja" class="boton-construccion">Granja</button>
                </div>

                <div class="grupo-construccion">
                    <h3>Servicios</h3>
                    <button id="btn-policia" class="boton-construccion">Policía</button>
                    <button id="btn-bomberos" class="boton-construccion">Bomberos</button>
                    <button id="btn-hospital" class="boton-construccion">Hospital</button>
                </div>

                <div class="grupo-construccion">
                    <h3>Utilidades</h3>
                    <button id="btn-planta-electrica" class="boton-construccion">Planta eléctrica</button>
                    <button id="btn-planta-agua" class="boton-construccion">Planta de agua</button>
                </div>

                <div class="grupo-construccion">
                    <h3>Recreación</h3>
                    <button id="btn-parque" class="boton-construccion">Parque</button>
                </div>

                <button id="btn-cancelar-construccion" class="boton-cancelar">
                    Cancelar selección
                </button>
            </section>
        </aside>

        <main class="zona-mapa">
            <h2>Mapa principal</h2>
            <div id="contenedor-mapa" class="contenedor-mapa">
                <p>Aquí se mostrará el mapa de la ciudad.</p>
            </div>
        </main>

        <aside class="sidebar-derecha">
            <section class="widget">
                <h2>Clima</h2>
                <div id="widget-clima">
                    <p>Próximamente.</p>
                </div>
            </section>

            <section class="widget">
                <h2>Noticias</h2>
                <div id="widget-noticias">
                    <p>Próximamente.</p>
                </div>
            </section>
        </aside>
    </div>

    <script type="module" src="../Scripts/juego.js"></script>
</body>
</html>
