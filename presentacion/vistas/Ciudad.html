<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Builder — Mi Ciudad</title>
    <link rel="stylesheet" href="../estilos/ciudad.css">
</head>
<body>

    <main class="pagina-ciudad">

        <!-- Encabezado -->
        <header class="ciudad-header">
            <div class="ciudad-header-info">
                <h1 id="ciudad-nombre">🏙️ Mi Ciudad</h1>
                <p id="ciudad-alcalde" class="ciudad-subtitulo"></p>
            </div>
            <div class="ciudad-header-acciones">
                <button id="btn-jugar" class="btn-primario">🎮 Ir al juego</button>
                <button id="btn-exportar" class="btn-secundario">📤 Exportar JSON</button>
                <button id="btn-eliminar" class="btn-peligro">🗑️ Eliminar partida</button>
            </div>
        </header>

        <!-- Tarjetas de resumen -->
        <section class="ciudad-resumen">

            <div class="resumen-card">
                <span class="resumen-icono">🗺️</span>
                <div class="resumen-info">
                    <h3>Región</h3>
                    <p id="ciudad-region">--</p>
                </div>
            </div>

            <div class="resumen-card">
                <span class="resumen-icono">📐</span>
                <div class="resumen-info">
                    <h3>Tamaño del mapa</h3>
                    <p id="ciudad-tamano">--</p>
                </div>
            </div>

            <div class="resumen-card">
                <span class="resumen-icono">🔄</span>
                <div class="resumen-info">
                    <h3>Turno actual</h3>
                    <p id="ciudad-turno">--</p>
                </div>
            </div>

            <div class="resumen-card">
                <span class="resumen-icono">🏆</span>
                <div class="resumen-info">
                    <h3>Puntuación</h3>
                    <p id="ciudad-puntuacion">--</p>
                </div>
            </div>

            <div class="resumen-card">
                <span class="resumen-icono">👥</span>
                <div class="resumen-info">
                    <h3>Población</h3>
                    <p id="ciudad-poblacion">--</p>
                </div>
            </div>

            <div class="resumen-card">
                <span class="resumen-icono">😊</span>
                <div class="resumen-info">
                    <h3>Felicidad</h3>
                    <p id="ciudad-felicidad">--</p>
                </div>
            </div>

        </section>

        <!-- Recursos -->
        <section class="ciudad-seccion">
            <h2>📦 Estado de recursos</h2>
            <div id="ciudad-recursos" class="ciudad-recursos-grid"></div>
        </section>

        <!-- Parámetros configurables -->
        <section class="ciudad-seccion">
            <h2>⚙️ Parámetros del juego</h2>
            <div class="parametros-grid">

                <div class="parametro-item">
                    <label for="param-turno">⏱️ Duración del turno (seg)</label>
                    <input type="number" id="param-turno" min="5" max="120" value="10">
                </div>

                <div class="parametro-item">
                    <label for="param-crecimiento">🌱 Tasa de crecimiento</label>
                    <input type="number" id="param-crecimiento" min="1" max="10" value="2">
                </div>

                <div class="parametro-item">
                    <label for="param-electricidad">⚡ Electricidad disponible</label>
                    <input type="number" id="param-electricidad" min="0" value="0">
                </div>

                <div class="parametro-item">
                    <label for="param-agua">💧 Agua disponible</label>
                    <input type="number" id="param-agua" min="0" value="0">
                </div>

                <div class="parametro-item">
                    <label for="param-alimentos">🌾 Alimentos disponibles</label>
                    <input type="number" id="param-alimentos" min="0" value="0">
                </div>

                <div class="parametro-item">
                    <label for="param-consumo-agua">💧 Consumo agua/ciudadano (X)</label>
                    <input type="number" id="param-consumo-agua" min="0" step="0.1" value="1">
                </div>

                <div class="parametro-item">
                    <label for="param-consumo-elec">⚡ Consumo electricidad/ciudadano (Y)</label>
                    <input type="number" id="param-consumo-elec" min="0" step="0.1" value="1">
                </div>

                <div class="parametro-item">
                    <label for="param-consumo-comida">🌾 Consumo comida/ciudadano (Z)</label>
                    <input type="number" id="param-consumo-comida" min="0" step="0.1" value="1">
                </div>

            </div>
            <button id="btn-guardar-params" class="btn-primario btn-guardar-params">
                💾 Guardar parámetros
            </button>
            <p id="mensaje-params" class="mensaje"></p>
        </section>

        <!-- Modal confirmación eliminar -->
        <div id="modal-eliminar" class="modal-overlay oculto">
            <div class="modal-caja">
                <h2>⚠️ ¿Eliminar partida?</h2>
                <p>Esta acción no se puede deshacer. Se perderá todo el progreso.</p>
                <div class="modal-botones">
                    <button id="btn-confirmar-eliminar" class="btn-peligro">Sí, eliminar</button>
                    <button id="btn-cancelar-eliminar" class="btn-secundario">Cancelar</button>
                </div>
            </div>
        </div>

    </main>

    <script type="module" src="../Scripts/ciudad.js"></script>
</body>
</html>
