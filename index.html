<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Ciudad</title>
    <link rel="stylesheet" href="./presentacion/estilos/ciudad.css">
</head>
<body>
    <section class="formulario-ciudad">
        <h1>Crear nueva ciudad</h1>

        <form id="formCrearCiudad">
            <div>
                <label for="nombreCiudad">Nombre de la ciudad</label>
                <input type="text" id="nombreCiudad" name="nombreCiudad" maxlength="50" required>
            </div>

            <div>
                <label for="nombreAlcalde">Nombre del alcalde</label>
                <input type="text" id="nombreAlcalde" name="nombreAlcalde" maxlength="50" required>
            </div>

            <div>
                <label for="region">Región</label>
                <input type="text" id="region" name="region" required>
            </div>

            <div>
                <label for="latitud">Latitud (ejm: 5.0703)</label>
                <input type="number" id="latitud" name="latitud" step="any" required>
            </div>

            <div>
                <label for="longitud">Longitud (ejm: -75.5138)</label>
                <input type="number" id="longitud" name="longitud" step="any" required>
            </div>

            <div>
                <label for="anchoMapa">Ancho del mapa</label>
                <input type="number" id="anchoMapa" name="anchoMapa" min="15" max="30" required>
            </div>

            <div>
                <label for="altoMapa">Alto del mapa</label>
                <input type="number" id="altoMapa" name="altoMapa" min="15" max="30" required>
            </div>

            <button type="submit">Crear ciudad</button>
        </form>

        <p id="mensaje"></p>
    </section>

    <script type="module" src="./presentacion/Scripts/index.js"></script>
</body>
</html>
